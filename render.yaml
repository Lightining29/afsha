# Render Blueprint configuration for monorepo using Docker
services:
  - type: web
    name: glowora
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        value: "" # set via Render dashboard (secret)
      - key: NODE_ENV
        value: "production"
